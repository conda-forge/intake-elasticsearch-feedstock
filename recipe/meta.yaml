{% set version = "0.2.0" %}
{% set name = "intake-elasticsearch" %}
{% set sha256 = "acae6a799dc5da63421af2227a421b2dcd598bc3ebb6b344c9000c4af31c4f57" %}

package:
   name: {{ name }}
   version: {{ version }}

source:
  fn: {{ name }}-{{ version }}.tar.gz
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 1
  noarch: python
  script: "{{ PYTHON }}  -m pip install . --no-deps --ignore-installed -vv"

requirements:
  host:
    - python {{ python_min }}
    - pip
    - jinja2
  run:
    - python >={{ python_min }}
    - intake >=0.3
    - dask >=1.0.0
    - requests
    - pandas

test:
  requires:
    - python {{ python_min }}
  imports:
    - intake_elasticsearch

about:
  home: https://github.com/ContinuumIO/intake-elasticsearch
  license: BSD-2-Clause
  license_file: LICENSE
  summary: ElasticSearch plugin for Intake

extra:
  recipe-maintainers:
    - martindurant
